# ===========================================================
# Docker Compose - WFP Kenya Food Prices Data Engineering
# Services: PostgreSQL, Grafana, Airflow (webserver + scheduler)
# ===========================================================

x-airflow-common: &airflow-common
  image: apache/airflow:3.1.7
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER:-airflow}:${AIRFLOW_DB_PASSWORD:-airflow}@postgres_airflow:5432/airflow
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-webserver:8080/execution/
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_JWT_SECRET}
    AIRFLOW__CORE__TEST_CONNECTION: Enabled
    PG_HOST: postgres
    PG_PORT: '5432'
    PG_DATABASE: food_prices_kenya
    PG_USER: ${PROJECT2_DB_USER:-postgres}
    PG_PASSWORD: ${PROJECT2_DB_PASSWORD:-postgres}
    PYTHONPATH: /opt/airflow/Scripts
    _PIP_ADDITIONAL_REQUIREMENTS: pandas psycopg2-binary sqlalchemy requests dbt-core dbt-postgres pyarrow
  volumes:
    - ./dags:/opt/airflow/dags
    - ./Scripts:/opt/airflow/Scripts
    - ./SQL:/opt/airflow/SQL
    - ./dbt:/opt/airflow/dbt
    - ./wfp_food_prices_ken.csv:/opt/airflow/wfp_food_prices_ken.csv
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:
  # ---------------------------------------------------------
  # PostgreSQL - main data warehouse
  # ---------------------------------------------------------
  postgres:
    image: postgres:17
    container_name: wfp_postgres
    environment:
      POSTGRES_USER: ${PROJECT2_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${PROJECT2_DB_PASSWORD:-postgres}
      POSTGRES_DB: food_prices_kenya
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./SQL/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------
  # PostgreSQL - Airflow metadata DB
  # ---------------------------------------------------------
  postgres_airflow:
    image: postgres:17
    container_name: wfp_postgres_airflow
    environment:
      POSTGRES_USER: ${AIRFLOW_DB_USER:-airflow}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD:-airflow}
      POSTGRES_DB: airflow
    ports:
      - "5433:5432"
    volumes:
      - pgdata_airflow:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------
  # Airflow Init (run migrations & create admin user)
  # ---------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: wfp_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin --password admin \
          --firstname Admin --lastname User \
          --role Admin --email admin@example.com || true
    depends_on:
      postgres_airflow:
        condition: service_healthy
    restart: "no"

  # ---------------------------------------------------------
  # Airflow Webserver
  # ---------------------------------------------------------
  airflow-webserver:
    <<: *airflow-common
    container_name: wfp_airflow_webserver
    command: api-server
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres_airflow:
        condition: service_healthy

  # ---------------------------------------------------------
  # Airflow Scheduler
  # ---------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    container_name: wfp_airflow_scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres_airflow:
        condition: service_healthy

  # ---------------------------------------------------------
  # Airflow DAG Processor
  # ---------------------------------------------------------
  airflow-dag-processor:
    <<: *airflow-common
    container_name: wfp_airflow_dag_processor
    command: dag-processor
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres_airflow:
        condition: service_healthy

  # ---------------------------------------------------------
  # Airflow Triggerer
  # ---------------------------------------------------------
  airflow-triggerer:
    <<: *airflow-common
    container_name: wfp_airflow_triggerer
    command: triggerer
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres_airflow:
        condition: service_healthy

  # ---------------------------------------------------------
  # Grafana - visualisation
  # ---------------------------------------------------------
  grafana:
    image: grafana/grafana:11.1.0
    container_name: wfp_grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/food_prices_dashboard.json
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  pgdata_airflow:
  airflow-logs:
  grafana-data:
