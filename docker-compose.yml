# ===========================================================
# Unified Docker Compose - Both ETL/ELT Pipelines
# Single Airflow instance running DAGs from Project 1 & 2
# ===========================================================

x-airflow-common: &airflow-common
  image: apache/airflow:3.1.7
  environment:
    # --- Airflow core ---
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__TEST_CONNECTION: Enabled
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: 'true'
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres_airflow:5432/airflow
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-webserver:8080/execution/
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_JWT_SECRET}
    # --- Project 1 connection (Airflow conn env var) ---
    AIRFLOW_CONN_MY_POSTGRES_DB: postgresql://${PROJECT1_DB_USER}:${PROJECT1_DB_PASSWORD}@postgres_project1/airflow
    # --- Project 2 env vars (used by Scripts/config.py) ---
    PG_HOST: postgres_project2
    PG_PORT: '5432'
    PG_DATABASE: food_prices_kenya
    PG_USER: ${PROJECT2_DB_USER}
    PG_PASSWORD: ${PROJECT2_DB_PASSWORD}
    # --- Python path for Project 2 Scripts ---
    PYTHONPATH: /opt/airflow/Scripts
    _PIP_ADDITIONAL_REQUIREMENTS: pandas psycopg2-binary sqlalchemy requests dbt-core dbt-postgres pyarrow
  volumes:
    # DAGs from both projects
    - ./Data_Engineering_Project1/dags:/opt/airflow/dags/project1
    - ./Data_Engineering_Project2/dags:/opt/airflow/dags/project2
    # Project 2 modules and assets
    - ./Data_Engineering_Project2/Scripts:/opt/airflow/Scripts
    - ./Data_Engineering_Project2/SQL:/opt/airflow/SQL
    - ./Data_Engineering_Project2/dbt:/opt/airflow/dbt
    - ./Data_Engineering_Project2/wfp_food_prices_ken.csv:/opt/airflow/wfp_food_prices_ken.csv
    # Project 1 CSV (loaded at /opt/airflow/data/)
    - ./Data_Engineering_Project1/wfp_food_prices_ken.csv:/opt/airflow/data/wfp_food_prices_ken.csv
    # Shared logs
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres_airflow:
      condition: service_healthy

services:
  # ---------------------------------------------------------
  # PostgreSQL - Airflow metadata DB
  # ---------------------------------------------------------
  postgres_airflow:
    image: postgres:17
    container_name: unified_postgres_airflow
    environment:
      POSTGRES_USER: ${AIRFLOW_DB_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD}
      POSTGRES_DB: airflow
    ports:
      - "5433:5432"
    volumes:
      - pgdata_airflow:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------
  # PostgreSQL - Project 1 data warehouse
  # ---------------------------------------------------------
  postgres_project1:
    image: postgres:17
    container_name: unified_postgres_project1
    environment:
      POSTGRES_USER: ${PROJECT1_DB_USER}
      POSTGRES_PASSWORD: ${PROJECT1_DB_PASSWORD}
      POSTGRES_DB: airflow
    ports:
      - "5435:5432"
    volumes:
      - pgdata_project1:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------
  # PostgreSQL - Project 2 data warehouse (star schema)
  # ---------------------------------------------------------
  postgres_project2:
    image: postgres:17
    container_name: unified_postgres_project2
    environment:
      POSTGRES_USER: ${PROJECT2_DB_USER}
      POSTGRES_PASSWORD: ${PROJECT2_DB_PASSWORD}
      POSTGRES_DB: food_prices_kenya
    ports:
      - "5434:5432"
    volumes:
      - pgdata_project2:/var/lib/postgresql/data
      - ./Data_Engineering_Project2/SQL/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------
  # Airflow Init (migrations + admin user)
  # ---------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: unified_airflow_init
    command: db migrate
    depends_on:
      postgres_airflow:
        condition: service_healthy
    restart: "no"

  # ---------------------------------------------------------
  # Airflow API Server (web UI)
  # ---------------------------------------------------------
  airflow-webserver:
    <<: *airflow-common
    container_name: unified_airflow_webserver
    command: api-server
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres_airflow:
        condition: service_healthy

  # ---------------------------------------------------------
  # Airflow Scheduler
  # ---------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    container_name: unified_airflow_scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres_airflow:
        condition: service_healthy

  # ---------------------------------------------------------
  # Airflow DAG Processor
  # ---------------------------------------------------------
  airflow-dag-processor:
    <<: *airflow-common
    container_name: unified_airflow_dag_processor
    command: dag-processor
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres_airflow:
        condition: service_healthy

  # ---------------------------------------------------------
  # Airflow Triggerer
  # ---------------------------------------------------------
  airflow-triggerer:
    <<: *airflow-common
    container_name: unified_airflow_triggerer
    command: triggerer
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres_airflow:
        condition: service_healthy

  # ---------------------------------------------------------
  # Grafana - visualisation (Project 2)
  # ---------------------------------------------------------
  grafana:
    image: grafana/grafana:11.1.0
    container_name: unified_grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD}
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/food_prices_dashboard.json
    ports:
      - "3000:3000"
    volumes:
      - ./Data_Engineering_Project2/grafana/provisioning:/etc/grafana/provisioning
      - ./Data_Engineering_Project2/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      postgres_project2:
        condition: service_healthy

volumes:
  pgdata_airflow:
  pgdata_project1:
  pgdata_project2:
  airflow-logs:
  grafana-data:
